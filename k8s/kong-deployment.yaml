apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-gateway-kong
  namespace: ai-gateway
  labels:
    app: ai-gateway-kong
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-gateway-kong
  template:
    metadata:
      labels:
        app: ai-gateway-kong
    spec:
      containers:
        - name: kong
          image: kong:3.7
          imagePullPolicy: IfNotPresent
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /kong/declarative/kong.yml
            - name: KONG_PROXY_LISTEN
              value: 0.0.0.0:8000
            - name: KONG_ADMIN_LISTEN
              value: "off"
            - name: KONG_NGINX_WORKER_PROCESSES
              value: "2"
          ports:
            - name: proxy
              containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: kong-config
              mountPath: /kong/declarative
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: kong-config
          configMap:
            name: ai-gateway-kong-config
