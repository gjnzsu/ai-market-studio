apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-gateway-kong-config
  namespace: ai-gateway
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    services:
      - name: ai-gateway
        url: http://ai-gateway.ai-gateway.svc.cluster.local
        routes:
          - name: ai-gateway-v1
            paths:
              - /v1
            strip_path: false
          - name: ai-gateway-health
            paths:
              - /health
            strip_path: false
          - name: ai-gateway-readiness
            paths:
              - /readiness
            strip_path: false

    plugins:
      - name: correlation-id
        config:
          header_name: X-Request-ID
          generator: uuid
          echo_downstream: true
      - name: rate-limiting
        config:
          minute: 120
          hour: 5000
          policy: local
