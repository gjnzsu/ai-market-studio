apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-market-studio
  labels:
    app: ai-market-studio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-market-studio
  template:
    metadata:
      labels:
        app: ai-market-studio
    spec:
      containers:
        - name: ai-market-studio
          image: gcr.io/gen-lang-client-0896070179/ai-market-studio:v2026-06-15-workflow-ui-polish
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ai-market-studio-config
            - secretRef:
                name: ai-market-studio-secrets
          env:
            - name: OBSERVABILITY_URL
              value: "http://ai-sre-observability.default.svc.cluster.local:8080"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
