apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-market-studio
  labels:
    app: ai-market-studio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-market-studio
  template:
    metadata:
      labels:
        app: ai-market-studio
    spec:
      containers:
        - name: ai-market-studio
          image: gcr.io/gen-lang-client-0896070179/ai-market-studio:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ai-market-studio-config
            - secretRef:
                name: ai-market-studio-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
        - name: ai-mcp-server
          image: gcr.io/gen-lang-client-0896070179/ai-mcp-server:latest
          ports:
            - containerPort: 8001
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
